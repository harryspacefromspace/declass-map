name: Update Declassified Map

on:
  schedule:
    - cron: "0 5 * * *"   # Every day at 5am UTC
  workflow_dispatch:        # Manual trigger from GitHub Actions tab
    inputs:
      build_only:
        description: 'Build map from existing data without refetching scenes'
        type: boolean
        default: false

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests staticmap Pillow

      - name: Generate config.json from secrets
        run: |
          cat > config.json << 'CONFIGEOF'
          {
            "usgs": {
              "username": "${{ secrets.M2M_USERNAME }}",
              "token": "${{ secrets.M2M_TOKEN }}"
            },
            "database": "scenes.db",
            "notifications": {
              "telegram": {
                "enabled": false
              }
            }
          }
          CONFIGEOF

      - name: Step 1 — Run monitoring script (builds scenes.db)
        if: ${{ github.event.inputs.build_only != 'true' }}
        run: python monitor.py

      - name: Step 2 — Build map from scenes.db
        run: python fetch_and_build.py ${{ github.event.inputs.build_only == 'true' && '--build-only' || '' }}
        env:
          M2M_USERNAME: ${{ secrets.M2M_USERNAME }}
          M2M_TOKEN: ${{ secrets.M2M_TOKEN }}

      - name: Commit index.html (untrack large files if needed)
        run: |
          git config user.name  "declass-map-bot"
          git config user.email "bot@users.noreply.github.com"
          # Stop tracking large generated files — safe to run every time
          git rm --cached scenes.db             2>/dev/null || true
          git rm --cached available_scenes.geojson 2>/dev/null || true
          git rm --cached "scenes_chunk_*.geojson" 2>/dev/null || true
          # Only commit the small HTML file
          git add index.html
          git add .gitignore 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Daily update $(date -u +%Y-%m-%d)"
          git push
